<!DOCTYPE html>
<html>
<head>
    <script>
        // CRITICAL: This script must run before anything else
        (function() {
            var host = window.location.hostname;
            var path = window.location.pathname;
            var parts = host.split('.');
            
            // Subdomain detection
            var isLocalhost = host.indexOf('localhost') !== -1;
            var isSubdomain = isLocalhost ? parts.length >= 2 : parts.length >= 3;

            if (isSubdomain && parts[0] !== 'www' && parts[0] !== 'kreavo') {
                var subdomain = parts[0];
                console.log("Subdomain detected:", subdomain);
                
                // If we are on the home page or root, we MUST redirect
                if (path === '/' || path === '/index.html') {
                    // We don't wait for Fetch here because it's too slow and might be blocked
                    // We just jump to the /s/ path which is handled by the Netlify function
                    window.location.replace('/s/' + subdomain);
                }
            }
        })();
    </script>
</head>
<body>
    <script>window.location.href = "/index.html";</script>
</body>
</html>

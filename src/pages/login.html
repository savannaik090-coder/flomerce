<!--
 * FLUXE SAAS PLATFORM - User Login Page
 * 
 * Purpose: Authentication interface for returning users.
 * Features: Email/Password login, error handling, redirect to signup.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fluxe</title>
    <script src="/src/common/env-config.js"></script>
    <link rel="stylesheet" href="/src/css/login.css">
</head>
<body>
    <div class="auth-card">
        <h2 style="text-align: center;">Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div id="error-msg" class="error"></div>
        </form>
        <p style="text-align: center; margin-top: 20px;">New to Fluxe? <a href="/src/pages/signup.html">Sign Up</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script type="module">
        import { authService } from '/src/js/auth/AuthService.js';
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = e.target.querySelector('button');
            
            btn.innerText = 'Logging in...';
            btn.disabled = true;

            try {
                await authService.login(email, password);
                window.location.href = '/src/pages/dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

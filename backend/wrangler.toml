# Cloudflare Workers Configuration
# Firebase to Cloudflare Migratio
# Version: 1.3

name = "saas-platform"
main = "workers/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom Domain Routes
# Frontend: fluxe.in
# Backend API: fluxe.in/api/*
# Wildcard subdomains: *.fluxe.in/*
routes = [
  { pattern = "fluxe.in/api/*", zone_name = "fluxe.in" },
  { pattern = "*.fluxe.in/*", zone_name = "fluxe.in" }
]

[vars]
ENVIRONMENT = "production"
SKIP_EMAIL_VERIFICATION = "false"
DOMAIN = "fluxe.in"
APP_URL = "https://fluxe.in"
FROM_EMAIL = "noreply@fluxe.in"
PAGES_HOSTNAME = "fluxe-8x1.pages.dev"
VAPID_PUBLIC_KEY = "BBFtjftWOpbgmrZGuPuWePb0ZIEyDz9pVppnsZqwMXewpiu3-JQy5nbBtqOjftgv8332Oy4i94j6NUBDphTh08s"
VAPID_SUBJECT = "mailto:noreply@fluxe.in"
# VAPID_PRIVATE_KEY for local dev only — in production, set as secret: wrangler secret put VAPID_PRIVATE_KEY
VAPID_PRIVATE_KEY = '{"key_ops":["sign"],"ext":true,"kty":"EC","x":"EW2N-1Y6luCatka4-5Z49vRkgTIPP2lWmmexmrAxd7A","y":"piu3-JQy5nbBtqOjftgv8332Oy4i94j6NUBDphTh08s","crv":"P-256","d":"xV4-1G0eDRkIDRvHNXrg9fPQQqlK3EeHmKdN_O37G9k"}'
# Cloudflare for SaaS — custom domain SSL provisioning
# CF_ZONE_ID: Zone ID for fluxe.in (find in Cloudflare dashboard → Overview → right sidebar)
# CF_API_TOKEN must be set as a secret: cd backend && npx wrangler secret put CF_API_TOKEN
# Token needs permission: Zone > Custom Hostnames > Edit
CF_ZONE_ID = "b65a77c931d934fdf0a05d201eb225e8"

# IMPORTANT: JWT_SECRET must be set as a secret, not a var!
# Run this command in the backend folder to set it:
# wrangler secret put JWT_SECRET
# Then enter a strong random string (32+ characters)
# Without JWT_SECRET, user authentication will fail!

# D1 Database Configuration
# Database: saas-platform-db
# ID: bbddf99e-dd63-4ace-b9d2-274c42404d65
[[d1_databases]]
binding = "DB"
database_name = "saas-platform-db"
database_id = "bbddf99e-dd63-4ace-b9d2-274c42404d65"
migrations_dir = "migrations"

# Shard D1 Databases
[[d1_databases]]
binding = "SHARD_1"
database_name = "saas-sites-db"
database_id = "da11d91d-13da-43a5-9360-321d880a90d1"

# Scheduled Cleanup (runs daily at 3:00 AM UTC)
[triggers]
crons = ["0 3 * * *"]

# R2 Storage Configuration
# Bucket: saas-platform-s
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "saas-platform-s"

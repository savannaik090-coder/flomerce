# Cloudflare Workers Configuratio
# Firebase to Cloudflare Migratio
# Version: 1.3

name = "saas-platform"
main = "workers/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Custom Domain Routes
# Frontend: fluxe.in
# Backend API: fluxe.in/api/*
# Wildcard subdomains: *.fluxe.in/*
routes = [
  { pattern = "fluxe.in/api/*", zone_name = "fluxe.in" },
  { pattern = "*.fluxe.in/*", zone_name = "fluxe.in" }
]

[vars]
ENVIRONMENT = "production"
SKIP_EMAIL_VERIFICATION = "true"
DOMAIN = "fluxe.in"

# D1 Database Configuration
# Database: saas-platform-db
# ID: bbddf99e-dd63-4ace-b9d2-274c42404d65
[[d1_databases]]
binding = "DB"
database_name = "saas-platform-db"
database_id = "bbddf99e-dd63-4ace-b9d2-274c42404d65"
migrations_dir = "migrations"

# R2 Storage Configuration
# Bucket: saas-platform-s
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "saas-platform-s"

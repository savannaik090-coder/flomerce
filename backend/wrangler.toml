# Cloudflare Workers Configuration
# Firebase to Cloudflare Migration
# Version: 1.2


name = "saas-platform"
main = "workers/index.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "saas-platform-db"
database_id = "bbddf99e-dd63-4ace-b9d2-274c42404d65"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "saas-platform-s"

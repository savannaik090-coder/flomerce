# Cloudflare Workers Configuration
# Firebase to Cloudflare Migratio
# Version: 1.3

name = "saas-platform"
main = "workers/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Custom Domain Routes
# Frontend: flomerce.com
# Backend API: flomerce.com/api/*
# Wildcard subdomains: *.flomerce.com/*
routes = [
  { pattern = "flomerce.com/api/*", zone_name = "flomerce.com" },
  { pattern = "*.flomerce.com/*", zone_name = "flomerce.com" }
]

[vars]
ENVIRONMENT = "production"
SKIP_EMAIL_VERIFICATION = "false"
DOMAIN = "flomerce.com"
APP_URL = "https://flomerce.com"
FROM_EMAIL = "noreply@flomerce.com"
PAGES_HOSTNAME = "flomerce.pages.dev"
VAPID_PUBLIC_KEY = "BBFtjftWOpbgmrZGuPuWePb0ZIEyDz9pVppnsZqwMXewpiu3-JQy5nbBtqOjftgv8332Oy4i94j6NUBDphTh08s"
VAPID_SUBJECT = "mailto:noreply@flomerce.com"
# VAPID_PRIVATE_KEY for local dev only — in production, set as secret: wrangler secret put VAPID_PRIVATE_KEY
VAPID_PRIVATE_KEY = '{"key_ops":["sign"],"ext":true,"kty":"EC","x":"EW2N-1Y6luCatka4-5Z49vRkgTIPP2lWmmexmrAxd7A","y":"piu3-JQy5nbBtqOjftgv8332Oy4i94j6NUBDphTh08s","crv":"P-256","d":"xV4-1G0eDRkIDRvHNXrg9fPQQqlK3EeHmKdN_O37G9k"}'
# Cloudflare for SaaS — custom domain SSL provisioning
# CF_ZONE_ID: Zone ID for flomerce.com (find in Cloudflare dashboard → Overview → right sidebar)
# CF_API_TOKEN must be set as a secret: cd backend && npx wrangler secret put CF_API_TOKEN
# Token needs permission: Zone > Custom Hostnames > Edit
CF_ZONE_ID = "26b94cc472428f25d8d5998fbe3f151e"

# IMPORTANT: These must be set as secrets (not vars):
# cd backend && npx wrangler secret put JWT_SECRET
# cd backend && npx wrangler secret put BREVO_API_KEY
# JWT_SECRET: Strong random string (32+ chars) — required for auth
# BREVO_API_KEY: Brevo transactional email API key — required for emails

# D1 Database Configuration
# Database: saas-platform-db
# ID: bbddf99e-dd63-4ace-b9d2-274c42404d65
[[d1_databases]]
binding = "DB"
database_name = "saas-platform-db"
database_id = "bbddf99e-dd63-4ace-b9d2-274c42404d65"
migrations_dir = "migrations"

# Shard D1 Databases
[[d1_databases]]
binding = "SHARD_1"
database_name = "saas-sites-db"
database_id = "da11d91d-13da-43a5-9360-321d880a90d1"

# Shard D2 Databases
[[d1_databases]]
binding = "SHARD_2"
database_name = "saas-sites-db-2"
database_id = "f2a10129-b13a-4df5-bff0-ecc61a687491"

# Shard D3 Databases
[[d1_databases]]
binding = "SHARD_3"
database_name = "saas-sites-db-3"
database_id = "7cd02690-e40c-40b3-822a-683da3d93ed2"

# Scheduled jobs
#  - "0 * * * *"  : hourly abandoned-cart reminder sweep (honors merchant delayHours setting)
#  - "0 3 * * *"  : daily cleanup (orphan media, expired sessions/tokens/stale orders)
#  - "5 0 1 * *"  : monthly enterprise overage snapshot + invoice email (00:05 UTC on the 1st)
# The scheduled() handler in workers/index.js dispatches on `event.cron` so each
# job keeps its own cadence (e.g. cleanup is NOT re-run hourly).
[triggers]
crons = ["0 * * * *", "0 3 * * *", "5 0 1 * *"]

# R2 Storage Configuration
# Bucket: saas-platform-s
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "saas-platform-s"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading Website...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="content">
        <div class="loader"></div>
        <p>Connecting to your website...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script>
        const host = window.location.hostname;
        const subdomain = host.split('.')[0];

        // If on main site, don't do anything (though netlify redirects should handle this)
        if (subdomain === 'kreavo' || subdomain === 'www' || subdomain === 'localhost') {
            // Main site handled by index.html
        } else {
            fetch(`/.netlify/functions/resolve-subdomain`)
                .then(res => res.json())
                .then(data => {
                    if (data.isMainSite) return;
                    document.title = data.siteData.siteName;
                    document.getElementById('content').innerHTML = `
                        <div style="text-align:center">
                            <h1>Welcome to ${data.siteData.siteName}</h1>
                            <p>Category: ${data.siteData.category}</p>
                            <p>This website is powered by Template: ${data.siteData.templateId}</p>
                            <hr>
                            <p><i>Full template injection with jewellery website logic coming in next build step.</i></p>
                        </div>
                    `;
                })
                .catch(err => {
                    document.getElementById('content').innerHTML = `<h1>Website Not Found</h1>`;
                });
        }
    </script>
</body>
</html>

name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
      - fluxe
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: d1 migrations apply DB --remote
        continue-on-error: true

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'backend'
          command: deploy --compatibility-date 2024-01-01 --name saas-platform

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "Deployment Complete!"
          echo "============================================"
          echo "D1 Database: saas-platform-db"
          echo "D1 Database ID: bbddf99e-dd63-4ace-b9d2-274c42404d65"
          echo "R2 Bucket: saas-platform-s"
          echo "Worker: saas-platform"
          echo "============================================"

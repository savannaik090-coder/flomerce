<!--
 * FLUXE SAAS PLATFORM - User Signup Page
 * 
 * Purpose: Account creation interface for new users.
 * Features: User registration with name, email, and password. 
 * Flow: Registers user, sends verification email, and redirects to login.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Fluxe</title>
    <script src="/src/common/EnvConfig.js"></script>
    <link rel="stylesheet" href="/src/css/signup.css">
</head>
<body>
    <div class="auth-card">
        <h2 style="text-align: center;">Join Fluxe</h2>
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="8">
            </div>
            <button type="submit" class="btn">Create Account</button>
            <div id="error-msg" class="error"></div>
        </form>
        <p style="text-align: center; margin-top: 20px;">Already have an account? <a href="/src/pages/login.html">Login</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script type="module">
        import { authService } from '/src/js/auth/AuthService.js';
        
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = e.target.querySelector('button');

            btn.innerText = 'Creating Account...';
            btn.disabled = true;

            try {
                await authService.signUp(name, email, password);
                alert('Account created! Please check your email for verification.');
                window.location.href = '/src/pages/login.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

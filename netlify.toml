[build]
  publish = "."
  command = "npm run build"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

# Edge function for wildcard subdomain routing
[[edge_functions]]
  function = "subdomain-router"
  path = "/*"

[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/site-router"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Default fallback for main domain
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

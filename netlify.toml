[build]
  publish = "."
  command = "npm install"
  functions = "functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Route EVERYTHING to the site-router, but ONLY if it's NOT a static asset
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/site-router"
  status = 200
  force = false

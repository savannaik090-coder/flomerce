[build]
  publish = "."
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Site router for /s/subdomain paths (existing functionality)
[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/site-router"
  status = 200
  force = true

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Wildcard subdomain router - Cloudflare will rewrite URLs to /w/subdomain/path
[[redirects]]
  from = "/w/:subdomain"
  to = "/.netlify/functions/wildcard-router"
  status = 200
  force = true

[[redirects]]
  from = "/w/:subdomain/*"
  to = "/.netlify/functions/wildcard-router"
  status = 200
  force = true

# Static assets for templates (direct access)
[[redirects]]
  from = "/templates/*"
  to = "/templates/:splat"
  status = 200
  force = false

# Default fallback for main domain
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[build]
  publish = "."
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/site-router"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Wildcard subdomain rewrites for *.fluxe.in
# API routes for wildcard subdomains
[[redirects]]
  from = "/api/*"
  to = "/templates/template1/.netlify/functions/:splat"
  status = 200
  force = true
  conditions = {Host = [":subdomain.fluxe.in"]}

# Netlify functions for wildcard subdomains
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/templates/template1/.netlify/functions/:splat"
  status = 200
  force = true
  conditions = {Host = [":subdomain.fluxe.in"]}

# Static assets (CSS, JS, images) for wildcard subdomains

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreavo - Build Your Business Website Automatically</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --text: #1f2937;
            --light: #f3f4f6;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--text); }
        .hero { padding: 100px 20px; text-align: center; background: linear-gradient(135deg, #fff 0%, var(--light) 100%); }
        .nav { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; }
        .btn { padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="logo">KREAVO</a>
        <div>
            <a href="/login.html" class="btn btn-outline" style="margin-right: 10px;">Login</a>
            <a href="/signup.html" class="btn btn-primary">Get Started</a>
        </div>
    </nav>
    <section class="hero">
        <h1>Automate Your Online Presence</h1>
        <p>Create professional websites for your business in seconds. No coding required.</p>
        <br>
        <a href="/signup.html" class="btn btn-primary" style="font-size: 1.2rem; padding: 15px 40px;">Create My Website</a>
    </section>
</body>
</html>

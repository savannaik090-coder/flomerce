[build]
  # Directory with the built static site
  publish = "."
  # Your build command - install function dependencies
  command = "cd netlify/functions && npm install --production"
  # Directory with Netlify Functions
  functions = "netlify/functions"

# Auto-install function dependencies
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Specific redirect for video upload (handles path correctly)
[[redirects]]
  from = "/api/videos/upload"
  to = "/.netlify/functions/videos"
  status = 200
  force = true

# Specific redirect for video operations by ID
[[redirects]]
  from = "/api/videos/:id"
  to = "/.netlify/functions/videos/:id"
  status = 200
  force = true

# Proxy API requests to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# CRITICAL: Service workers MUST NOT be redirected - they need correct MIME type
[[redirects]]
  from = "/service-worker.js"
  to = "/service-worker.js"
  status = 200
  force = false

[[redirects]]
  from = "/firebase-messaging-sw.js"
  to = "/firebase-messaging-sw.js"
  status = 200
  force = false

# Make sure each HTML page is properly served
[[redirects]]
  from = "/checkout.html"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/product-detail.html"
  to = "/product-detail.html"
  status = 200

[[redirects]]
  from = "/admin-promotions.html"
  to = "/admin-promotions.html"
  status = 200

[[redirects]]
  from = "/login.html"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/signup.html"
  to = "/signup.html"
  status = 200

[[redirects]]
  from = "/profile.html"
  to = "/profile.html"
  status = 200

[[redirects]]
  from = "/admin-notifications.html"
  to = "/admin-notifications.html"
  status = 200

# CRITICAL: Netlify Functions must NOT be redirected - preserve function calls
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Handle direct navigation for SPA as fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


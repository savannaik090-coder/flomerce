<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_TITLE}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 100px 0; text-align: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1 class="display-3 fw-bold">{{BRAND_NAME}}</h1>
            <p class="lead">{{SITE_DESCRIPTION}}</p>
            <a href="#contact" class="btn btn-light btn-lg mt-3">Contact Us</a>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="card p-5">
                    <h2>Welcome to {{BRAND_NAME}}</h2>
                    <p class="text-muted mt-3">We are a professional {{CATEGORY}} business dedicated to providing the best service to our customers.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 {{BRAND_NAME}}. Built with Kreavo.</p>
        </div>
    </footer>
</body>
</html>

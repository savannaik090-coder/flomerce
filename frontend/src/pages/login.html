<!--
 * FLUXE SAAS PLATFORM - User Login Page
 * 
 * Purpose: Authentication interface for returning users.
 * Features: Email/Password login, error handling, redirect to signup.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fluxe</title>
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <script src="/src/common/EnvConfig.js"></script>
    <link rel="stylesheet" href="/src/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p>Enter your details to access your account.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
                <div id="error-msg" class="error"></div>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; margin-bottom: 0;">
                New to Fluxe? <a href="/src/pages/signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { authService } from '/src/js/auth/AuthService.js';
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = e.target.querySelector('button');
            
            btn.innerText = 'Logging in...';
            btn.disabled = true;

            try {
                await authService.login(email, password);
                window.location.href = '/src/pages/dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

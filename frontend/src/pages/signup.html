<!--
 * FLUXE SAAS PLATFORM - User Signup Page
 * 
 * Purpose: Account creation interface for new users.
 * Features: User registration with name, email, and password. 
 * Flow: Registers user, sends verification email, and redirects to login.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Fluxe</title>
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <script src="/src/common/EnvConfig.js"></script>
    <link rel="stylesheet" href="/src/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Create an account</h2>
            <p>Start your 60-second website journey today.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create account</button>
                <div id="error-msg" class="error"></div>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; margin-bottom: 0;">
                Already have an account? <a href="/src/pages/login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { authService } from '/src/js/auth/AuthService.js';
        
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const btn = e.target.querySelector('button');

            btn.innerText = 'Creating Account...';
            btn.disabled = true;

            try {
                const result = await authService.signUp(name, email, password);
                if (result.success) {
                    alert('Account created! Please check your email for verification.');
                    window.location.href = '/src/pages/login.html';
                } else {
                    throw new Error(result.error || 'Signup failed');
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

<!--
 * FLUXE SAAS PLATFORM - User Signup Page
 * 
 * Purpose: Account creation interface for new users.
 * Features: User registration with name, email, and password. 
 * Flow: Registers user, sends verification email, and redirects to login.
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Fluxe</title>
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <script src="/src/common/EnvConfig.js"></script>
    <link rel="stylesheet" href="/src/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Create an account</h2>
            <p>Start your 60-second website journey today.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create account</button>
                <div id="google-signin-btn" style="margin-top: 1rem;"></div>
                <div id="error-msg" class="error"></div>
            </form>
            <div id="success-box" style="display: none; text-align: center; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-top: 20px;">
                <h3 style="color: green;">Verification Required</h3>
                <p>Please check your email to verify your account. If you didn't receive it, check your spam folder.</p>
                <button id="resend-btn" class="btn" style="margin-top: 10px;">Resend Email</button>
            </div>
            <p style="text-align: center; margin-top: 1.5rem; margin-bottom: 0;">
                Already have an account? <a href="/src/pages/login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
            </p>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module">
        import { authService } from '/src/js/api/AuthService.js';
        
        window.handleGoogleSignIn = async (response) => {
            try {
                const res = await authService.googleSignIn(response.credential);
                if (res.success) window.location.href = '/src/pages/dashboard.html';
            } catch (error) {
                alert(error.message);
            }
        };

        window.onload = () => {
            google.accounts.id.initialize({
                client_id: "1008005597417-icubq31993f3hob2fuc5em8d9ftope0c.apps.googleusercontent.com",
                callback: window.handleGoogleSignIn
            });
            google.accounts.id.renderButton(
                document.getElementById("google-signin-btn"),
                { theme: "outline", size: "large", width: "100%" }
            );
        };

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            const form = document.getElementById('signup-form');
            const successBox = document.getElementById('success-box');
            const btn = e.target.querySelector('button');

            btn.innerText = 'Creating Account...';
            btn.disabled = true;

            try {
                const result = await authService.signUp(name, email, password);
                if (result.success) {
                    form.style.display = 'none';
                    successBox.style.display = 'block';
                    document.getElementById('resend-btn').onclick = async () => {
                        await authService.resendVerification(email);
                        alert('Verification email resent!');
                    };
                } else {
                    throw new Error(result.error || 'Signup failed');
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Fluxe</title>
    <link rel="stylesheet" href="/src/css/index.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card" style="text-align: center;">
            <h2 id="status-title">Verifying...</h2>
            <p id="status-msg">Please wait while we verify your email.</p>
            <a href="/src/pages/login.html" class="btn btn-primary" id="login-btn" style="display: none;">Go to Login</a>
        </div>
    </div>
    <script type="module">
        import { authService } from '/src/js/api/AuthService.js';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const title = document.getElementById('status-title');
        const msg = document.getElementById('status-msg');
        const btn = document.getElementById('login-btn');

        if (!token) {
            title.textContent = 'Invalid Link';
            msg.textContent = 'Verification token is missing.';
        } else {
            authService.verifyEmail(token).then(res => {
                if (res.success) {
                    title.textContent = 'Email Verified!';
                    msg.textContent = 'Your email has been successfully verified. You can now log in.';
                    btn.style.display = 'inline-block';
                } else {
                    title.textContent = 'Verification Failed';
                    msg.textContent = res.error || 'The link may be expired or invalid.';
                }
            });
        }
    </script>
</body>
</html>

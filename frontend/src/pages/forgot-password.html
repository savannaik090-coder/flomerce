<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fluxe</title>
    <link rel="stylesheet" href="/src/css/index.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Forgot Password</h2>
            <p>Enter your email to receive a reset link.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" required placeholder="name@company.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
                <div id="msg" style="margin-top: 1rem; display: none;"></div>
            </form>
            <p style="text-align: center; margin-top: 1rem;"><a href="/src/pages/login.html">Back to Login</a></p>
        </div>
    </div>
    <script type="module">
        import { authService } from '/src/js/api/AuthService.js';
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msg = document.getElementById('msg');
            try {
                await authService.requestPasswordReset(email);
                msg.textContent = 'If an account exists, a reset link has been sent.';
                msg.className = 'success';
            } catch (error) {
                msg.textContent = error.message;
                msg.className = 'error';
            }
            msg.style.display = 'block';
        });
    </script>
</body>
</html>

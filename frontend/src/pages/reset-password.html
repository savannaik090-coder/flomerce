<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Fluxe</title>
    <link rel="stylesheet" href="/src/css/index.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Reset Password</h2>
            <form id="reset-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" required minlength="8" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
                <div id="msg" style="margin-top: 1rem; display: none;"></div>
            </form>
        </div>
    </div>
    <script type="module">
        import { authService } from '/src/js/api/AuthService.js';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (!token) window.location.href = '/src/pages/login.html';

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            try {
                const res = await authService.resetPassword(token, password);
                if (res.success) {
                    msg.textContent = 'Password reset successful! Redirecting...';
                    setTimeout(() => window.location.href = '/src/pages/login.html', 2000);
                } else throw new Error(res.error);
            } catch (error) {
                msg.textContent = error.message;
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>

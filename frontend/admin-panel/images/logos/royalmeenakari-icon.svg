<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#f5f1e8"/>
  
  <!-- Outer decorative ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#d4af37" stroke-width="8"/>
  
  <!-- Crown -->
  <g transform="translate(128, 80)">
    <!-- Crown base -->
    <ellipse cx="0" cy="20" rx="35" ry="12" fill="#d4af37" stroke="#8b7000" stroke-width="1"/>
    
    <!-- Crown band -->
    <rect x="-35" y="12" width="70" height="18" fill="#d4af37" stroke="#8b7000" stroke-width="1"/>
    
    <!-- Decorative diamonds on band -->
    <polygon points="0,14 4,20 0,26 -4,20" fill="#c41e3a"/>
    <polygon points="-20,14 -16,20 -20,26 -24,20" fill="#1e90ff"/>
    <polygon points="20,14 24,20 20,26 16,20" fill="#2d5016"/>
    
    <!-- Left point -->
    <polygon points="-25,-10 -20,25 -30,25" fill="#d4af37" stroke="#8b7000" stroke-width="1"/>
    <circle cx="-25" cy="-15" r="6" fill="#f0e68c"/>
    
    <!-- Center point (highest) -->
    <polygon points="0,-25 8,22 -8,22" fill="#d4af37" stroke="#8b7000" stroke-width="1"/>
    <circle cx="0" cy="-30" r="8" fill="#f0e68c"/>
    <circle cx="0" cy="-28" r="5" fill="#c41e3a"/>
    
    <!-- Right point -->
    <polygon points="25,-10 20,25 30,25" fill="#d4af37" stroke="#8b7000" stroke-width="1"/>
    <circle cx="25" cy="-15" r="6" fill="#f0e68c"/>
  </g>
  
  <!-- Text "RM" for Royal Meenakari -->
  <text x="128" y="180" font-family="Georgia, serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#d4af37" letter-spacing="2">RM</text>
  
  <!-- Decorative elements corners -->
  <circle cx="30" cy="30" r="4" fill="#c41e3a" opacity="0.6"/>
  <circle cx="226" cy="30" r="4" fill="#1e90ff" opacity="0.6"/>
  <circle cx="30" cy="226" r="4" fill="#2d5016" opacity="0.6"/>
  <circle cx="226" cy="226" r="4" fill="#c41e3a" opacity="0.6"/>
</svg>